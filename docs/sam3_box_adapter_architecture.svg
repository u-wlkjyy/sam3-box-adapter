<svg xmlns="http://www.w3.org/2000/svg" width="1380" height="820" viewBox="0 0 1380 820">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 15px Arial, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
      .frozen { fill: #eef6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .train { fill: #ecfdf5; stroke: #16a34a; stroke-width: 2; rx: 8; }
      .warn { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
      .group { fill: none; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 6; rx: 12; }
      .label { font: 700 15px Arial, sans-serif; fill: #0f172a; }
      .text { font: 13px Arial, sans-serif; fill: #334155; }
      .small { font: 12px Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #16a34a; stroke-width: 2.2; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1380" height="820" fill="#f8fafc"/>
  <text x="40" y="48" class="title">SAM3-BoxAdapter Network Structure</text>
  <text x="40" y="74" class="subtitle">Frozen SAM3 vision backbone + trainable residual adapters + trainable box-only detection head</text>

  <rect x="55" y="130" width="145" height="80" class="box"/>
  <text x="128" y="158" text-anchor="middle" class="label">Input image</text>
  <text x="128" y="184" text-anchor="middle" class="text">RGB frame</text>

  <rect x="245" y="130" width="165" height="80" class="box"/>
  <text x="328" y="154" text-anchor="middle" class="label">Preprocess</text>
  <text x="328" y="178" text-anchor="middle" class="text">Resize 1008 x 1008</text>
  <text x="328" y="196" text-anchor="middle" class="text">Normalize</text>

  <rect x="455" y="105" width="600" height="230" class="group"/>
  <text x="475" y="132" class="label">Frozen SAM3 image backbone</text>

  <rect x="485" y="160" width="135" height="85" class="frozen"/>
  <text x="552" y="186" text-anchor="middle" class="label">Patch embed</text>
  <text x="552" y="210" text-anchor="middle" class="text">ViT tokens</text>

  <rect x="660" y="160" width="160" height="85" class="frozen"/>
  <text x="740" y="184" text-anchor="middle" class="label">ViT blocks</text>
  <text x="740" y="207" text-anchor="middle" class="text">0 .. K-1</text>
  <text x="740" y="225" text-anchor="middle" class="small">frozen no-grad</text>

  <rect x="860" y="160" width="160" height="85" class="frozen"/>
  <text x="940" y="184" text-anchor="middle" class="label">Last N blocks</text>
  <text x="940" y="207" text-anchor="middle" class="text">frozen weights</text>
  <text x="940" y="225" text-anchor="middle" class="small">adapter fusion</text>

  <rect x="760" y="270" width="250" height="85" class="train"/>
  <text x="885" y="294" text-anchor="middle" class="label">Residual adapters</text>
  <text x="885" y="318" text-anchor="middle" class="text">Linear 1024 -> rank -> 1024</text>
  <text x="885" y="336" text-anchor="middle" class="small">trainable, low-rank</text>

  <rect x="1095" y="160" width="160" height="85" class="frozen"/>
  <text x="1175" y="184" text-anchor="middle" class="label">SimpleFPN neck</text>
  <text x="1175" y="207" text-anchor="middle" class="text">256-channel</text>
  <text x="1175" y="225" text-anchor="middle" class="small">multi-scale features</text>

  <rect x="1085" y="305" width="185" height="75" class="box"/>
  <text x="1178" y="331" text-anchor="middle" class="label">Feature selection</text>
  <text x="1178" y="355" text-anchor="middle" class="text">usually last 1 level</text>

  <rect x="495" y="465" width="720" height="190" class="group"/>
  <text x="515" y="492" class="label">Trainable FCOS-style detector head</text>

  <rect x="535" y="525" width="190" height="85" class="train"/>
  <text x="630" y="550" text-anchor="middle" class="label">Class tower</text>
  <text x="630" y="574" text-anchor="middle" class="text">Conv + GN + SiLU</text>

  <rect x="780" y="525" width="190" height="85" class="train"/>
  <text x="875" y="550" text-anchor="middle" class="label">Box tower</text>
  <text x="875" y="574" text-anchor="middle" class="text">Conv + GN + SiLU</text>

  <rect x="1025" y="505" width="145" height="65" class="train"/>
  <text x="1098" y="532" text-anchor="middle" class="label">Class logits</text>
  <text x="1098" y="552" text-anchor="middle" class="small">sigmoid scores</text>

  <rect x="1025" y="590" width="145" height="65" class="train"/>
  <text x="1098" y="617" text-anchor="middle" class="label">LTRB boxes</text>
  <text x="1098" y="637" text-anchor="middle" class="small">softplus reg</text>

  <rect x="1095" y="705" width="170" height="70" class="warn"/>
  <text x="1180" y="733" text-anchor="middle" class="label">Decode</text>
  <text x="1180" y="756" text-anchor="middle" class="text">threshold + NMS</text>

  <rect x="80" y="515" width="300" height="130" class="box"/>
  <text x="230" y="543" text-anchor="middle" class="label">Training labels</text>
  <text x="230" y="570" text-anchor="middle" class="text">YOLO: class cx cy w h</text>
  <text x="230" y="594" text-anchor="middle" class="text">FCOS point assignment</text>
  <text x="230" y="618" text-anchor="middle" class="small">focal + L1 + GIoU losses</text>

  <rect x="70" y="700" width="360" height="54" class="box"/>
  <text x="250" y="722" text-anchor="middle" class="label">Saved checkpoint</text>
  <text x="250" y="743" text-anchor="middle" class="text">head + adapter_state only, no SAM3 weights</text>

  <path d="M200 170 L245 170" class="arrow"/>
  <path d="M410 170 L485 202" class="arrow"/>
  <path d="M620 202 L660 202" class="arrow"/>
  <path d="M820 202 L860 202" class="arrow"/>
  <path d="M1020 202 L1095 202" class="arrow"/>
  <path d="M1175 245 L1178 305" class="arrow"/>
  <path d="M1178 380 C1178 430 630 445 630 525" class="arrow"/>
  <path d="M1178 380 C1178 430 875 445 875 525" class="arrow"/>
  <path d="M725 567 L1025 537" class="arrow"/>
  <path d="M970 567 L1025 622" class="arrow"/>
  <path d="M1098 570 L1170 705" class="arrow"/>
  <path d="M1098 655 L1170 705" class="arrow"/>

  <path d="M940 245 C940 265 915 270 900 270" class="dash"/>
  <path d="M885 270 C870 255 880 245 895 245" class="dash"/>
  <path d="M380 580 L535 567" class="arrow"/>
  <path d="M630 610 C600 700 430 700 430 727" class="arrow"/>
  <path d="M885 610 C820 705 430 705 430 727" class="arrow"/>
  <path d="M890 355 C820 410 780 465 780 525" class="arrow"/>

  <text x="40" y="800" class="small">Blue = frozen SAM3 modules, green = trainable task-specific modules, orange = post-processing.</text>
</svg>
